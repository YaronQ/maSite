<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Player/player.css">
    <link rel="stylesheet" href="gallery/gallery.css">
    <title>maSite</title>

    <script defer src="script.js"></script>
</head>
<body>
    <div class="background"></div>

    <!-- Сама спектрограмма (фон) -->
    <div class="spectrogram-container">
        <canvas id="spectrogramCanvas"></canvas>
        <div class="hint">⚡  Real-time spectrum</div>
    </div>  

    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>
    <section class="layers">
        <div class="layers_container">
            <!-- <img class="layers_item layer3_2" src="img/girl_b.png" alt=""> -->
            <img class="layers_item layer3_1" src="img/girl_p.png" alt="">
            <img class="layers_item layer3" src="img/girl.png" alt="">
            <h1 class="layers_item layer1">LET`S TRY</h1>
            <h1 class="layers_item layer1" style="color: rgb(17, 17, 17); font-weight: 100;">LET`S TRY</h1>
            <div class="layers_item layer2">
                <div class="player-card">
                    <div class="header">
                        <h1>🎧 Music</h1>
                        <small>Wait for the wayform to load before pressing play</small>
                    </div>

                    <div class="controls">
                        <button class="play-btn" id="playBtn" aria-label="Play/Pause">
                            <svg viewBox="0 0 24 24" id="playIcon">
                                <polygon points="6,3 20,12 6,21" />
                            </svg>
                            <span id="playLabel">Play</span>
                        </button>

                        <div class="track-selector">
                            <label>🎵</label>
                            <select id="trackSelect">
                                <!-- Из JavaScript -->
                            </select>
                        </div>

                        <div class="status-badge idle" id="statusBadge">
                            <span id="statusText">Ready</span>
                        </div>
                    </div>

                    <!-- Вейформа -->
                    <div class="waveform-container" id="waveformContainer">
                        <canvas id="waveformCanvas"></canvas>
                        <div class="waveform-progress" id="waveformProgress"></div>
                        <div id="waveformTime">0:00</div>
                        <div class="waveform-tooltip" id="waveformTooltip">0:00</div>
                    </div>


                    <div class="progress-area">
                        <span class="time-label" id="currentTimeLabel">0:00</span>
                        <span class="time-label" id="durationLabel" style="margin-left: auto;">0:00</span>
                    </div>

                    <div class="volume-area">
                        <span class="volume-icon">🔊</span>
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.2">
                        <span class="volume-label" id="volumeLabel">80%</span>
                    </div>
</div>
                </div>
            </div>  
    </section>

    <main>
        <div class="gallery-container">
            <!-- Фильтр по играм -->
            <div class="gallery-filter">
                <button class="filter-btn active" data-game="all">Все игры</button>
                <button class="filter-btn" data-game="minecraft">Minecraft</button>
                <button class="filter-btn" data-game="enfield">Arknights Enfield</button>
            </div>

            <!-- Сетка скриншотов -->
            <div class="gallery-grid" id="galleryGrid">
                <!-- Скриншоты будут добавляться через JavaScript -->
            </div>
        </div>

        <!-- Модальное окно для просмотра -->
        <div class="gallery-modal" id="galleryModal">
            <button class="modal-close" id="modalClose">✕</button>
            <img class="modal-image" id="modalImage" src="" alt="Screenshot">
            <div class="modal-info" id="modalInfo">
                <span class="modal-title" id="modalTitle">Название скриншота</span>
                <span class="modal-game" id="modalGame">Игра</span>
                <span class="modal-date" id="modalDate">Дата</span>
            </div>
        </div>
    </main>
    
    <script src="Player/player.js"></script>
    <script src="gallery/gallery.js"></script>
</body>
</html>
